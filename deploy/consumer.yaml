apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: consumer
      annotations:
        instrumentation.opentelemetry.io/inject-go: "go-auto-instrumentation"
        instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/consumer"
    spec:
      containers:
      - name: consumer
        image: localhost:32000/consumer:latest

apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: single-node
  labels:
    strimzi.io/cluster: kafka-otel-sandbox
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
    kraftMetadata: shared

---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-otel-sandbox
spec:
  kafka:
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false

    config:
      default.replication.factor: 1
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1

  entityOperator:
    topicOperator: {}
    userOperator: {}

## Configure grafana datasources
## ref: http://docs.grafana.org/administration/provisioning/#datasources
##
datasources:
 datasources.yaml:
   apiVersion: 1
   datasources:
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      jsonData:
        tracesToLogs:
          datasourceUid: ""
